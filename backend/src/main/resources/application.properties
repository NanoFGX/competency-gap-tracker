spring.application.name=competency-tracker
server.port=8081

# H2 file-based database (persists between restarts)
spring.datasource.url=jdbc:h2:file:./data/competency-tracker;AUTO_SERVER=TRUE
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=

# JPA / Hibernate
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false

# H2 web console (open http://localhost:8081/h2-console to browse data)
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console
spring.h2.console.settings.web-allow-others=false
